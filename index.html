<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#EEF4FB">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ぐるぐる">
<title>ぐるぐるアバター カメラ版</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<!-- iOS は manifest の icons を読まないため apple-touch-icon を別途指定（不透明 PNG）。
     manifest / SW の登録は vite-plugin-pwa が <head> に注入する。 -->
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180.png">
<meta name="description" content="Webカメラで顔の向き・口の動きに合わせて同調するブラウザアバター（PixiJS スプライト描画版）。">
<!-- OGP / Twitter Card（SNS のカード表示用。画像・URL は本番の絶対URL） -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="ぐるぐるアバター">
<meta property="og:locale" content="ja_JP">
<meta property="og:title" content="ぐるぐるアバター カメラ版">
<meta property="og:description" content="Webカメラで顔の向き・口の動きに合わせて同調するブラウザアバター（PixiJS スプライト描画版）。">
<meta property="og:url" content="https://tommie-jp.github.io/guruguru-avatar/">
<meta property="og:image" content="https://tommie-jp.github.io/guruguru-avatar/ogp.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="ぐるぐるアバター カメラ版">
<meta name="twitter:description" content="Webカメラで顔の向き・口の動きに合わせて同調するブラウザアバター（PixiJS スプライト描画版）。">
<meta name="twitter:image" content="https://tommie-jp.github.io/guruguru-avatar/ogp.png">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  img { -webkit-user-drag: none; }
  /* スマホ対応: safe-area 変数（JSX/パネルが calc で参照）。env 未対応でも 0px に落ちる。 */
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sar: env(safe-area-inset-right, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
  }
  /* ダブルタップズーム抑止（パン＝スクロールは残る）／タップハイライト・長押しメニュー抑止。
     2本指ピンチのページズーム抑止は src/mobile-hardening.js が JS で担う。 */
  html {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    user-select: none; -webkit-user-select: none;
  }
  html, body { overscroll-behavior: none; }
  /* コピー/入力したい要素は選択を復活（QR の <code>・クレジットリンク等を潰さない）。 */
  code, a, input, textarea, [contenteditable] {
    -webkit-touch-callout: default; user-select: text; -webkit-user-select: text;
  }
  @media (prefers-reduced-motion: no-preference) {
    .bob { animation: bob 3.4s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -1.2vmin; }
    }
  }
  /* 演出バー（スマホ＝画面下の横スクロール帯）のスクロールバーを隠す。
     ::-webkit-scrollbar はインライン style で書けないためここで定義する。 */
  .cuebar-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .cuebar-scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .cuebar-scroll button:focus-visible { outline: 2px solid #3B74E8; outline-offset: 1px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="src/tweaks-panel.jsx"></script>
<script type="module" src="src/camera-app.jsx"></script>
</body>
</html>
